[pytest]
# Pytest configuration for STL Validation Framework

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers
markers =
    requires_openscad: Test requires OpenSCAD to be installed
    requires_cloudcompare: Test requires CloudCompare to be installed
    slow: Slow running test (>10s)
    high_priority: High priority test case (core functionality)
    smoke: Quick smoke test

# Logging
log_cli = false
log_cli_level = INFO
log_file = test_results.log
log_file_level = DEBUG

# Coverage (if pytest-cov is installed)
# addopts = --cov=tests --cov-report=html --cov-report=term

# Timeout (if pytest-timeout is installed)
timeout = 300
timeout_method = thread

# Parallel execution (if pytest-xdist is installed)
# addopts = -n auto

# JSON report (if pytest-json-report is installed)
# addopts = --json-report --json-report-file=test_report.json
